<aside class="w-64 h-screen border-r border-slate-200 bg-white flex flex-col justify-between p-4">
  <div class="space-y-6">
    <div class="flex items-center gap-3 p-2">
      <span class="material-symbols-outlined text-indigo-500 p-2 bg-indigo-50 rounded-full">
        deployed_code
      </span>
      <div class="flex items-center leading-tight">
        <h1 class="font-bold text-sm leading-tight tracking-widest">DocuMind</h1>
        <span class="pl-1 text-sm text-indigo-500 font-semibold tracking-wider uppercase">AI</span>
      </div>
    </div>

    <nav class="space-y-1">
      @for (item of sidebarItems; track $index) {
        <a
          href="#"
          [routerLink]="item.id"
          (click)="setWorkspace(item.id)"
          [class.bg-indigo-50]=" currentWorkspace() === item.id"
          [class.text-indigo-700]=" currentWorkspace() === item.id"
          [class.font-semibold]=" currentWorkspace() === item.id"
          class="flex items-center gap-3 px-3 py-2.5  hover:bg-slate-50 rounded-lg text-sm transition"
        >
          <span [class.text-indigo-700]=" currentWorkspace() === item.id" class="material-symbols-outlined"> {{ item.icon }} </span> {{ item.label }}
        </a>
      }
    </nav>
  </div>

  <div>
    <a
      href="#"
      (click)="setWorkspace('settings')"
      [class.bg-indigo-50]=" currentWorkspace() === 'settings'"
      [class.text-indigo-700]=" currentWorkspace() === 'settings'"
      [class.font-semibold]=" currentWorkspace() === 'settings'"
      class="flex items-center gap-3 px-3 py-2.5 hover:bg-indigo-50 rounded-lg text-sm transition"
    >
      <span [class.text-indigo-700]=" currentWorkspace() === 'settings'" Class="material-symbols-outlined"> settings </span> Settings
    </a>
  </div>
</aside>
