spring:
  application:
    name: gateway-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:documind_metadata}?serverTimezone=Asia/Kolkata
    username: ${DB_USER:documind_user}
    password: ${DB_PASSWORD:documind_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

  servlet:
    multipart:
      enabled: true
#      max-file-size: 10MB
#      max-request-size: 10MB
#  codec:
#    max-in-memory-size: 10MB