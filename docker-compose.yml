version: '3.8'

services:
  # 1. Relational Database for Document Registry and System Metadata
  postgres:
    image: postgres:15-alpine
    container_name: documind-postgres
    environment:
      POSTGRES_USER: documind_user
      POSTGRES_PASSWORD: documind_password
      POSTGRES_DB: documind_metadata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - documind-network

  # 2. Vector Database for Storing Text Chunks and Vector Embeddings
  chromadb:
    image: chromadb/chroma:1.5.9
    container_name: documind-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - documind-network

  # 3. In-Memory Cache for Semantic Caching and Rate-Limiting
  redis:
    image: redis:7-alpine
    container_name: documind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - documind-network

volumes:
  postgres_data:
  chroma_data:
  redis_data:

networks:
  documind-network:
    driver: bridge